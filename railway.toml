# Railway — API service (apps/api)
# Connect this repo, create one service, and point it at the repository root.
# Web deploys separately on Vercel (apps/web/vercel.json).

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npx turbo build --filter=@beacon/api"

[deploy]
startCommand = "npm run start --workspace=@beacon/api"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
